# AGS CLI Configuration File
# Copy this file to ~/.ags/config.toml and modify as needed

# Backend type: "e2b" or "cloud" (default: cloud)
backend = "cloud"

# Default output format: "text" or "json"
output = "text"

# Region for API access (default: ap-guangzhou)
# region = "ap-guangzhou"

# Base domain for AGS services (default: tencentags.com)
# domain = "tencentags.com"

# Use internal endpoints for Tencent Cloud internal network (default: false)
# internal = false

# Authentication
[auth]
# API key for E2B backend
# api_key = ""

# Tencent Cloud credentials for cloud backend
# secret_id = ""
# secret_key = ""

# Sandbox Configuration
[sandbox]
# Default user for data plane operations (default: "user")
# default_user = "user"
